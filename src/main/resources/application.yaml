server:
  port: 8080

spring:
  application:
    name: backend

  config:
    import: optional:classpath:application-local.yaml

  datasource:
    url: jdbc:postgresql://localhost:5432/hackathon?tcpKeepAlive=true
    username: myuser
    password: secret
    hikari:
      max-lifetime: 600000
      keepalive-time: 120000
      connection-timeout: 30000
      validation-timeout: 5000

  jpa:
    hibernate:
      ddl-auto: update

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  secret: 1234567891234567891234567891234567891234567891234567891234567891234
  expiration: 86400000

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}
  whatsapp-from: ${TWILIO_WHATSAPP_FROM:}