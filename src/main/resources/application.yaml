server:
  port: ${PORT:8080}

spring:
  application:
    name: backend

  config:
    import: optional:classpath:application-local.yaml

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/hackathon?tcpKeepAlive=true}
    username: ${DATABASE_USERNAME:myuser}
    password: ${DATABASE_PASSWORD:secret}
    hikari:
      max-lifetime: 600000
      keepalive-time: 120000
      connection-timeout: 30000
      validation-timeout: 5000

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://campus-notify.vercel.app}

jwt:
  secret: ${JWT_SECRET:1234567891234567891234567891234567891234567891234567891234567891234}
  expiration: 86400000

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}
  whatsapp-from: ${TWILIO_WHATSAPP_FROM:}
